  }

const STORAGE_KEY = "lifecheck_history_v1";
const DAILY_GOAL = 100;

// --- pixel-art background decorations ---
function spriteBoxShadow(matrix, size, color) {
  const shadows = [];
  matrix.forEach((row, y) => {
    [...row].forEach((ch, x) => {
      if (ch === "1") shadows.push(`${x*size}px ${y*size}px 0 0 ${color}`);
    });
  });
  return shadows.join(",");
}

function makeSprite(matrix, size, color, top, left, opacity) {
  const el = document.createElement("div");
  el.className = "sprite";
  el.style.width = size + "px";
  el.style.height = size + "px";
  el.style.top = top;
  el.style.left = left;
  el.style.opacity = opacity != null ? opacity : 1;
  el.style.boxShadow = spriteBoxShadow(matrix, size, color);
  return el;
}

const SPRITES = {
  sun: ["00111100","01111110","11111111","11111111","11111111","11111111","01111110","00111100"],
  cloud: ["00111100000","01111111000","11111111110","11111111111","01111111110"],
  bush: ["011110","111111","111111"],
  hill: ["0001100000","0011110000","0111111000","1111111100","1111111110"],
  mushroom: ["0111110","1111111","1101101","1111111","0011000","0011000"],
  star: ["0010000","0010000","1111111","0111100","0010000","0100010"],
  pipe: ["111111","111111","111111","111111","111111"],
};

function buildBackground() {
  const layer = document.getElementById("bgLayer");
  if (!layer) return;
  layer.innerHTML = "";
  const coin = "#fcd000", white = "#fcfcfc", green = "#00a800", greenDark = "#007800",
        bushGreen = "#1e9c1e", hillGreen = "#3cb33c", red = "#fc4040";

  layer.appendChild(makeSprite(SPRITES.sun, 10, coin, "4%", "8%", 0.95));
  layer.appendChild(makeSprite(SPRITES.cloud, 8, white, "6%", "78%", 0.9));
  layer.appendChild(makeSprite(SPRITES.cloud, 6, white, "16%", "4%", 0.85));
  layer.appendChild(makeSprite(SPRITES.star, 6, white, "24%", "88%", 0.8));
  layer.appendChild(makeSprite(SPRITES.star, 5, white, "34%", "6%", 0.7));
  layer.appendChild(makeSprite(SPRITES.mushroom, 7, red, "45%", "85%", 0.85));
  layer.appendChild(makeSprite(SPRITES.cloud, 7, white, "55%", "5%", 0.8));
  layer.appendChild(makeSprite(SPRITES.hill, 9, hillGreen, "calc(100% - 70px)", "2%", 0.9));
  layer.appendChild(makeSprite(SPRITES.hill, 7, bushGreen, "calc(100% - 56px)", "20%", 0.85));
  layer.appendChild(makeSprite(SPRITES.bush, 9, bushGreen, "calc(100% - 50px)", "84%", 0.9));
  layer.appendChild(makeSprite(SPRITES.bush, 7, green, "calc(100% - 40px)", "92%", 0.85));
  const pipeEl = makeSprite(SPRITES.pipe, 9, greenDark, "calc(100% - 70px)", "94%", 0.95);
  pipeEl.style.borderTop = "4px solid #000";
  layer.appendChild(pipeEl);
}

function todayDate() {
  const d = new Date();
  d.setHours(0,0,0,0);
  return d;
}

function dateKey(d) {
  return d.getFullYear() + "-" + String(d.getMonth()+1).padStart(2,"0") + "-" + String(d.getDate()).padStart(2,"0");
}

let memoryFallback = null;

function loadHistory() {
  try {
    return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {};
  } catch(e) {
    return memoryFallback || {};
  }
}

function saveHistory(h) {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(h));
  } catch(e) {
    memoryFallback = h;
  }
}

let history = loadHistory();
let selectedDate = todayDate();

function getDayFor(d) {
  const k = dateKey(d);
  if (!history[k]) history[k] = { checks: {}, variable: {}, failed: {} };
  if (!history[k].failed) history[k].failed = {};
  return history[k];
}

let day = getDayFor(selectedDate);

function render() {
  const main = document.getElementById("main");
  main.innerHTML = "";
  DATA.forEach(group => {
    const catEl = document.createElement("div");
    catEl.className = "category";
    const h2 = document.createElement("h2");
    const icon = document.createElement("span");
    icon.className = "icon";
    icon.textContent = CATEGORY_ICONS[group.cat] || "★";
    h2.appendChild(icon);
    h2.appendChild(document.createTextNode(group.cat));
    catEl.appendChild(h2);

    group.tasks.forEach(task => {
      catEl.appendChild(renderTask(task, false));
      if (task.bonus) {
        catEl.appendChild(renderTask(task.bonus, true, task.id));
      }
    });
    main.appendChild(catEl);
  });
  document.getElementById("main").appendChild(buildFooter());
  updateStats();
}

function renderTask(task, isBonus, parentId) {
  const row = document.createElement("div");
  row.className = "task" + (isBonus ? " bonus" : "") + (task.variable ? " variable" : "");
  row.dataset.id = task.id;

  const isFailed = !!day.failed[task.id];

  if (task.variable) {
    const cb = document.createElement("input");
    cb.type = "checkbox";
    cb.checked = !!day.checks[task.id];
    cb.disabled = isFailed;
    cb.addEventListener("change", () => {
      day.checks[task.id] = cb.checked;
      day.failed[task.id] = false;
      if (!cb.checked) day.variable[task.id] = 0;
      persistAndRender();
    });
    row.appendChild(cb);

    const label = document.createElement("label");
    label.textContent = task.name;
    row.appendChild(label);

    if (isFailed) {
      const skull = document.createElement("span");
      skull.className = "skull";
      skull.textContent = "💀";
      row.appendChild(skull);
    } else {
      const num = document.createElement("input");
      num.type = "number";
      num.min = 0;
      num.placeholder = "pts";
      num.value = day.variable[task.id] || "";
      num.addEventListener("input", () => {
        day.variable[task.id] = parseInt(num.value, 10) || 0;
        day.checks[task.id] = day.variable[task.id] > 0;
        persistAndRender();
      });
      row.appendChild(num);
    }

    row.appendChild(makeFailBtn(task.id, isFailed, () => {
      day.checks[task.id] = false;
      day.variable[task.id] = 0;
    }));

    if (isFailed) row.classList.add("failed");
    return row;
  }

  const cb = document.createElement("input");
  cb.type = "checkbox";
  cb.checked = !!day.checks[task.id];
  cb.disabled = isFailed;
  cb.addEventListener("change", () => {
    day.checks[task.id] = cb.checked;
    day.failed[task.id] = false;
    if (!cb.checked) {
      // uncheck dependent bonus if this is a parent
      const group = DATA.flatMap(g => g.tasks).find(t => t.id === task.id);
      if (group && group.bonus) day.checks[group.bonus.id] = false;
    }
    persistAndRender();
  });
  row.appendChild(cb);

  const label = document.createElement("label");
  label.textContent = task.name;
  label.addEventListener("click", () => { if (!isFailed) cb.click(); });
  row.appendChild(label);

  if (isFailed) {
    const skull = document.createElement("span");
    skull.className = "skull";
    skull.textContent = "💀";
    row.appendChild(skull);
  } else {
    const pts = document.createElement("span");
    pts.className = "pts";
    pts.textContent = "+" + task.pts;
    row.appendChild(pts);
  }

  row.appendChild(makeFailBtn(task.id, isFailed, () => {
    day.checks[task.id] = false;
    const group = DATA.flatMap(g => g.tasks).find(t => t.id === task.id);
    if (group && group.bonus) {
      day.checks[group.bonus.id] = false;
      day.failed[group.bonus.id] = false;
    }
  }));

  if (isBonus) {
    const parentChecked = !!day.checks[parentId];
    row.classList.toggle("unlocked", parentChecked);
    cb.disabled = !parentChecked || isFailed;
  }
  if (cb.checked) row.classList.add("done");
  if (isFailed) row.classList.add("failed");

  return row;
}

function makeFailBtn(taskId, isFailed, onFail) {
  const btn = document.createElement("button");
  btn.className = "fail-btn";
  btn.type = "button";
  btn.textContent = "✕";
  btn.title = isFailed ? "Undo fail" : "Mark as failed";
  btn.addEventListener("click", () => {
    const next = !day.failed[taskId];
    day.failed[taskId] = next;
    if (next) onFail();
    persistAndRender();
  });
  return btn;
}

function buildFooter() {
  const wrap = document.createElement("div");
  wrap.className = "footer-actions";

  const resetBtn = document.createElement("button");
  resetBtn.className = "danger";
  resetBtn.textContent = "Reset this day";
  resetBtn.addEventListener("click", () => {
    if (confirm("Reset this day's checklist?")) {
      history[dateKey(selectedDate)] = { checks: {}, variable: {}, failed: {} };
      day = history[dateKey(selectedDate)];
      persistAndRender();
    }
  });
  wrap.appendChild(resetBtn);

  const hist = document.createElement("div");
  hist.className = "history";
  hist.style.flex = "1 1 100%";
  hist.style.order = "2";
  hist.innerHTML = "<h2>Last 14 days</h2>";
  const dates = Object.keys(history).sort().reverse().slice(0, 14);
  dates.forEach(d => {
    const score = computeScore(history[d]);
    const r = document.createElement("div");
    r.className = "hist-row";
    r.innerHTML = `<span class="d">${d}</span><span class="s">${score} pts</span>`;
    hist.appendChild(r);
  });

  const outer = document.createElement("div");
  outer.appendChild(wrap);
  outer.appendChild(hist);
  return outer;
}

function computeScore(d) {
  let total = 0;
  DATA.forEach(group => {
    group.tasks.forEach(task => {
      if (task.variable) {
        total += d.variable[task.id] || 0;
      } else {
        if (d.checks[task.id]) total += task.pts;
        if (task.bonus && d.checks[task.bonus.id]) total += task.bonus.pts;
      }
    });
  });
  return total;
}

function updateStats() {
  const todayScore = computeScore(day);
  document.getElementById("todayScore").textContent = todayScore;

  const allDates = Object.keys(history).sort();
  let best = 0;
  allDates.forEach(d => { best = Math.max(best, computeScore(history[d])); });
  document.getElementById("bestScore").textContent = best;

  const last7 = allDates.slice(-7);
  const avg = last7.length ? Math.round(last7.reduce((s,d) => s + computeScore(history[d]), 0) / last7.length) : 0;
  document.getElementById("avgScore").textContent = avg;

  // streak: consecutive days (ending today or yesterday) with score > 0
  let streak = 0;
  let cursor = new Date();
  while (true) {
    const k = cursor.getFullYear() + "-" + String(cursor.getMonth()+1).padStart(2,"0") + "-" + String(cursor.getDate()).padStart(2,"0");
    const d = history[k];
    if (d && computeScore(d) > 0) {
      streak++;
      cursor.setDate(cursor.getDate() - 1);
    } else {
      break;
    }
  }
  document.getElementById("streak").textContent = streak;

  const real = todayDate();
  const isToday = dateKey(selectedDate) === dateKey(real);
  const yesterday = new Date(real);
  yesterday.setDate(yesterday.getDate() - 1);
  const isYesterday = dateKey(selectedDate) === dateKey(yesterday);

  const dl = document.getElementById("dateLabel");
  const formatted = selectedDate.toLocaleDateString(undefined, { weekday:'long', month:'short', day:'numeric' });
  dl.textContent = isToday ? ("Today — " + formatted) : isYesterday ? ("Yesterday — " + formatted) : formatted;

  document.getElementById("scoreLabel").textContent = isToday ? "Today" : "Score";

  document.getElementById("nextDay").disabled = isToday;

  const pct = Math.min(100, Math.round((todayScore / DAILY_GOAL) * 100));
  document.getElementById("goalText").textContent = todayScore + " / " + DAILY_GOAL;
  document.getElementById("goalPct").textContent = pct + "%";
  const bar = document.getElementById("goalBar");
  bar.style.width = pct + "%";
  bar.classList.toggle("complete", todayScore >= DAILY_GOAL);
}

function persistAndRender() {
  history[dateKey(selectedDate)] = day;
  try {
    saveHistory(history);
  } catch(e) {
    // ignore storage failures, UI still updates below
  }
  render();
}

function goToDate(d) {
  d.setHours(0,0,0,0);
  selectedDate = d;
  day = getDayFor(selectedDate);
  render();
}

document.getElementById("prevDay").addEventListener("click", () => {
  const d = new Date(selectedDate);
  d.setDate(d.getDate() - 1);
  goToDate(d);
});

document.getElementById("nextDay").addEventListener("click", () => {
  const real = todayDate();
  if (dateKey(selectedDate) === dateKey(real)) return;
  const d = new Date(selectedDate);
  d.setDate(d.getDate() + 1);
  goToDate(d);
});

buildBackground();
render();

if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("sw.js").catch(() => {});
  });
}
</script>
