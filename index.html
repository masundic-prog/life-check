<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Life Check — Daily Points</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icons/icon-192.png">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<meta name="theme-color" content="#4a7ce0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Life Check">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
  :root {
    --sky: #5c94fc;
    --sky-dark: #4a7ce0;
    --ground: #c84c0c;
    --ground-dark: #8c3000;
    --block: #fcb03c;
    --block-dark: #c87800;
    --pipe: #00a800;
    --pipe-dark: #007800;
    --white: #fcfcfc;
    --black: #000000;
    --coin: #fcd000;
    --bonus: #ec6cff;
    --danger: #fc4040;
    --text: #fcfcfc;
    --panel: #2c3a8c;
  }
  * { box-sizing: border-box; image-rendering: pixelated; }
  html { background: var(--sky); }
  body {
    margin: 0;
    font-family: "Press Start 2P", monospace;
    position: relative;
    background: var(--sky);
    color: var(--text);
    padding-bottom: 80px;
    font-size: 10px;
    line-height: 1.6;
    overflow-x: hidden;
  }
  ::selection { background: var(--coin); color: var(--black); }

  /* ── background layer ── */
  .bg-layer { position: fixed; inset: 0; z-index: 0; pointer-events: none; overflow: hidden; }
  .bg-layer .sprite { position: absolute; background-color: transparent; }
  .ground-strip {
    position: fixed; left: 0; right: 0; bottom: 0; height: 22px;
    background-image: repeating-linear-gradient(90deg, var(--ground) 0 18px, var(--ground-dark) 18px 20px, var(--black) 20px 22px);
    border-top: 4px solid var(--black); z-index: 0;
  }
  header, main { position: relative; z-index: 1; }

  /* ── sticky header ── */
  header {
    position: sticky; top: 0;
    background: var(--sky-dark);
    border-bottom: 6px solid var(--black);
    padding: 12px 14px 14px;
    z-index: 10;
  }
  .date-nav { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
  .date-nav h1 { margin: 0; flex: 1; text-align: center; font-size: 11px; font-weight: normal; color: var(--coin); text-shadow: 2px 2px 0 #000; }
  .nav-btn {
    flex: none; width: 28px; height: 28px;
    background: var(--block); border: 3px solid var(--black);
    box-shadow: 2px 2px 0 rgba(0,0,0,0.4);
    color: var(--black); font-size: 10px; cursor: pointer;
    font-family: "Press Start 2P", monospace; padding: 0;
  }
  .nav-btn:disabled { opacity: 0.3; cursor: not-allowed; }
  .nav-btn:active:not(:disabled) { box-shadow: none; transform: translate(2px,2px); }

  /* ── stats row ── */
  .stats { display: flex; gap: 6px; flex-wrap: nowrap; margin-bottom: 10px; }
  .stat {
    background: var(--black); border: 3px solid var(--white);
    padding: 5px 4px; flex: 1; text-align: center;
  }
  .stat .num { font-size: 13px; color: var(--coin); text-shadow: 1px 1px 0 #000; }
  .stat .lbl { color: var(--white); font-size: 6px; margin-top: 3px; }

  /* ── goal bar ── */
  .goal-wrap { background: var(--black); border: 3px solid var(--white); padding: 5px 8px; margin-bottom: 10px; }
  .goal-label { display: flex; justify-content: space-between; font-size: 7px; margin-bottom: 5px; color: var(--white); }
  .goal-label .goal-pts { color: var(--coin); }
  .goal-bar-outer { background: #222; border: 2px solid var(--white); height: 16px; overflow: hidden; }
  .goal-bar-inner {
    height: 100%;
    background: repeating-linear-gradient(90deg, var(--pipe) 0 8px, var(--pipe-dark) 8px 16px);
    transition: width 0.3s steps(12); width: 0%;
  }
  .goal-bar-inner.complete {
    background: repeating-linear-gradient(90deg, var(--coin) 0 8px, var(--block-dark) 8px 16px);
  }

  /* ── tab bar ── */
  .tab-bar {
    display: flex; gap: 0;
    border-bottom: 4px solid var(--black);
  }
  .tab-btn {
    flex: 1; padding: 10px 6px;
    background: var(--black); border: none; border-right: 3px solid var(--black);
    color: #888; font-size: 9px; cursor: pointer;
    font-family: "Press Start 2P", monospace;
    text-transform: uppercase; letter-spacing: 0.03em;
  }
  .tab-btn:last-child { border-right: none; }
  .tab-btn.active { background: var(--coin); color: var(--black); }

  /* ── main content ── */
  main { max-width: 640px; margin: 0 auto; padding: 14px 12px; }

  /* ── category header ── */
  .category { margin-bottom: 20px; }
  .category h2 {
    font-size: 10px; color: var(--black); background: var(--coin);
    border: 3px solid var(--black); display: inline-flex; align-items: center;
    gap: 7px; padding: 5px 10px; margin: 0 0 8px;
    box-shadow: 3px 3px 0 rgba(0,0,0,0.5);
  }
  .category h2 .icon { font-size: 12px; }

  /* ── task rows ── */
  .task {
    display: flex; align-items: center; gap: 8px;
    background: var(--panel); border: 3px solid var(--black);
    box-shadow: 3px 3px 0 rgba(0,0,0,0.4);
    padding: 8px 10px; margin-bottom: 6px;
    transition: background 0.12s;
  }
  .task.done { background: var(--pipe-dark); border-color: var(--coin); }
  .task.failed { background: #161616; border-color: #555; }
  .task.failed label { color: #888; text-decoration: line-through; }
  .task.failed input[type=checkbox] { opacity: 0.3; }

  /* sub-items: slight indent, thinner border accent, same row height */
  .task.sub {
    margin-left: 10px;
    background: #1e1448;
    border-left: 4px solid var(--bonus);
    border-color: var(--black);
    border-left-color: var(--bonus);
    opacity: 0.4;
    pointer-events: none;
  }
  .task.sub.unlocked { opacity: 1; pointer-events: auto; }
  .task.sub.done { background: #4a2060; border-left-color: var(--coin); border-color: var(--black); border-left-color: var(--coin); }
  .task.sub .pts { color: var(--bonus); }
  .task.sub.done .pts { color: var(--white); }

  .task.radio-option {
    margin-left: 10px;
    background: #1e1e00;
    border-left: 4px solid var(--coin);
    border-color: var(--black);
    border-left-color: var(--coin);
    opacity: 0.4;
    pointer-events: none;
  }
  .task.radio-option.unlocked { opacity: 1; pointer-events: auto; }
  .task.radio-option.done { background: #3a3200; }
  .task.radio-option .pts { color: var(--coin); }

  /* ── checkbox ── */
  .task input[type=checkbox] {
    appearance: none; width: 20px; height: 20px; flex-shrink: 0;
    background: var(--black); border: 3px solid var(--white);
    cursor: pointer; position: relative;
  }
  .task input[type=checkbox]:checked { background: var(--coin); }
  .task input[type=checkbox]:checked::after {
    content: "X"; position: absolute;
    top: 50%; left: 50%; transform: translate(-50%, -54%);
    font-size: 10px; color: var(--black);
  }

  /* ── labels & points ── */
  .task label { flex: 1; font-size: 8px; cursor: pointer; color: var(--white); text-shadow: 1px 1px 0 #000; line-height: 1.5; }
  .task .pts { font-size: 9px; color: var(--coin); text-shadow: 1px 1px 0 #000; min-width: 34px; text-align: right; white-space: nowrap; }
  .task .pts.zero { color: #888; }

  /* ── skull & variable input ── */
  .skull { font-size: 13px; min-width: 34px; text-align: right; }
  .task.variable input[type=number] {
    width: 46px; background: var(--black); border: 3px solid var(--white);
    color: var(--coin); padding: 3px 4px; font-size: 9px;
    font-family: "Press Start 2P", monospace;
  }

  /* ── fail button ── */
  .fail-btn {
    flex: none; width: 20px; height: 20px;
    background: var(--black); border: 2px solid var(--danger);
    color: var(--danger); font-size: 9px; line-height: 1;
    cursor: pointer; font-family: "Press Start 2P", monospace; padding: 0;
  }
  .fail-btn:active { transform: translate(1px,1px); }
  .task.failed .fail-btn { background: var(--danger); color: var(--black); }

  /* ── footer ── */
  .footer-actions { display: flex; gap: 10px; margin-top: 20px; }
  button.action-btn {
    flex: 1; background: var(--block); border: 3px solid var(--black);
    box-shadow: 3px 3px 0 rgba(0,0,0,0.4); color: var(--black);
    padding: 10px 8px; font-size: 8px; cursor: pointer;
    font-family: "Press Start 2P", monospace;
  }
  button.action-btn:active { box-shadow: none; transform: translate(2px,2px); }
  button.action-btn.danger { background: var(--danger); color: var(--white); }

  /* ── history ── */
  .history { margin-top: 24px; background: var(--black); border: 3px solid var(--white); padding: 10px 12px; }
  .history h2 { font-size: 9px; color: var(--coin); margin: 0 0 10px; }
  .hist-row { display: flex; justify-content: space-between; font-size: 7px; padding: 6px 0; border-bottom: 2px dotted #444; color: var(--white); }
  .hist-row .s { color: var(--coin); }
</style>
</head>

<header>

<script>
// ─── DATA ────────────────────────────────────────────────────────
const TASKS = [

    { id:"w10", pts:20, name:"Meditation" },
    { id:"w11", pts:5,  name:"High protein breakfast" },
  ]},
  { cat: "Work – 10am to 8pm", icon: "💼", tasks: [

  ]},

    { id:"wn2",  pts:5,  name:"Reply to one unread message", stackedBonuses:[
      { id:"wn2b1", pts:7,  name:"Reply to a second" },
      { id:"wn2b2", pts:10, name:"Reply to a third" },
      { id:"wn2b3", pts:15, name:"Reply to a fourth" },
    ]},
    { id:"wn3",  pts:15, name:"See a friend" },
    { id:"wn4",  pts:15, name:"Initiate a social plan" },
    { id:"wn5",  pts:8,  name:"Plan a date" },
    { id:"wn6",  pts:4,  name:"Work on social ties map" },
    { id:"wn7",  pts:8,  name:"Work on mindmap" },

    { id:"wn9",  pts:10, name:"Make a story" },
    { id:"wn10", pts:12, name:"Make a post" },
    { id:"wn11", pts:5,  name:"Build a playlist" },
    { id:"wn12", pts:20, name:"Create something beautiful" },
    { id:"wn13", pts:5,  name:"Take a nice photo" },
  ]},
  { cat: "Eating", icon: "🥗", tasks: [
    { id:"e1", pts:2, name:"Drink a big glass of water before eating" },
    { id:"e2", pts:8, name:"Eat without consuming any content" },
    { id:"e3", pts:2, name:"1 serving of leafy greens" },
    { id:"e4", pts:5, name:"Stop eating at 80% fullness" },
  ]},
  { cat: "22h – Bedtime", icon: "🌙", tasks: [
    { id:"b1", pts:1, name:"Put phone to charge out of reach", radioGroup:[
      { id:"b1r1", pts:2,  name:"No phone 30 min before bed" },
      { id:"b1r2", pts:5,  name:"No phone 60 min before bed" },
      { id:"b1r3", pts:10, name:"No phone 90 min before bed" },
    ]},
    { id:"b2", pts:1, name:"Read a book before sleeping", radioGroup:[
      { id:"b2r1", pts:5,  name:"For 10 min" },
      { id:"b2r2", pts:10, name:"For 20 min" },
      { id:"b2r3", pts:15, name:"For 30+ min" },
    ]},
    { id:"b3",  pts:8, name:"Write the day" },
    { id:"b4",  pts:8, name:"Write tomorrow's todo" },
    { id:"b5",  pts:2, name:"Dinner finished before 22h" },
    { id:"b6",  pts:4, name:"Put on a movie around 22h", bonus:{ id:"b6b", pts:7, name:"No phone while watching" }},
    { id:"b7",  pts:3, name:"Protein snack before sleep" },
    { id:"b8",  pts:1, name:"Magnesium" },
    { id:"b9",  pts:1, name:"Melatonin" },
    { id:"b10", pts:1, name:"Retinol" },
    { id:"b11", pts:1, name:"Moisturize" },
    { id:"b12", pts:1, name:"Floss" },
    { id:"b13", pts:2, name:"Warm shower" },
  ]},
];

const ACHIEVEMENTS = [
  { cat: "Core", icon: "💪", tasks: [
    { id:"a1",  pts:15, name:"Alcohol-free" },
    { id:"a2",  pts:15, name:"Smoke-free", bonus:{ id:"a2b", pts:5, name:"Vape-free" }},
    { id:"a3",  pts:15, name:"Sugar-free", stackedBonuses:[
      { id:"a3b1", pts:5,  name:"No liquid calories (except shakes)" },
      { id:"a3b2", pts:15, name:"No fruits" },
    ]},
    { id:"a4",  pts:10, name:"Porn-free", radioGroup:[
      { id:"a4r1", pts:10, name:"0 masturbation" },
      { id:"a4r2", pts:5,  name:"1 masturbation" },
    ]},
    { id:"a5",  pts:10, name:"Sub 1h instagram time" },
    { id:"a6",  pts:25, name:"Strength workout", bonus:{ id:"a6b", pts:10, name:"Eat 160g protein" }},
    { id:"a7",  pts:10, name:"Moderate cardio (30 min)" },
    { id:"a8",  pts:10, name:"Breathhold training" },
    { id:"a9",  pts:5,  name:"Boredom rep (10 min)" },
    { id:"a10", pts:8,  name:"3 conscious pauses before phone use" },
    { id:"a11", pts:7,  name:"Spend time in nature" },
    { id:"a12", pts:7,  name:"Take time to look / smell" },
    { id:"a13", pts:4,  name:"Listen to music with intention" },
    { id:"a14", pts:15, name:"Talk to a stranger" },
    { id:"a15", pts:12, name:"Ask a curious question to someone" },
    { id:"a16", pts:15, name:"Give a genuine compliment" },
    { id:"a17", pts:20, name:"No looking for sex online" },
    { id:"a18", pts:25, name:"Spend time alone and enjoy it" },
    { id:"a19", pts:10, name:"In bed before 00:30" },
  ]},
];

const ALL_DATA = [...TASKS, ...ACHIEVEMENTS];

// ─── STORAGE ─────────────────────────────────────────────────────
const STORAGE_KEY = "lifecheck_v2";
const DAILY_GOAL  = 200;
let memFallback   = null;

function loadHistory() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; }
  catch(e) { return memFallback || {}; }
}
function saveHistory(h) {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(h)); }
  catch(e) { memFallback = h; }
}

let history = loadHistory();

function todayDate() { const d = new Date(); d.setHours(0,0,0,0); return d; }
function dateKey(d) {
  return d.getFullYear() + "-" + String(d.getMonth()+1).padStart(2,"0") + "-" + String(d.getDate()).padStart(2,"0");
}

let selectedDate = todayDate();

function getDayFor(d) {
  const k = dateKey(d);
  if (!history[k]) history[k] = { checks:{}, variable:{}, failed:{} };
  if (!history[k].failed) history[k].failed = {};
  return history[k];
}

let day = getDayFor(selectedDate);

// ─── TABS ─────────────────────────────────────────────────────────
let activeTab = "tasks"; // "tasks" | "achievements"

document.getElementById("tabTasks").addEventListener("click", () => {
  activeTab = "tasks";
  document.getElementById("tabTasks").classList.add("active");
  document.getElementById("tabAchievements").classList.remove("active");
  render();
});
document.getElementById("tabAchievements").addEventListener("click", () => {
  activeTab = "achievements";
  document.getElementById("tabAchievements").classList.add("active");
  document.getElementById("tabTasks").classList.remove("active");
  render();
});

// ─── RENDER ───────────────────────────────────────────────────────
function render() {
  const main = document.getElementById("main");
  main.innerHTML = "";
  const groups = activeTab === "tasks" ? TASKS : ACHIEVEMENTS;

  groups.forEach(group => {
    const catEl = document.createElement("div");
    catEl.className = "category";
    const h2 = document.createElement("h2");
    const icon = document.createElement("span"); icon.className = "icon"; icon.textContent = group.icon || "★";
    h2.appendChild(icon);
    h2.appendChild(document.createTextNode(group.cat));
    catEl.appendChild(h2);

    group.tasks.forEach(task => {
      catEl.appendChild(renderTask(task, false, null, null));
      if (task.bonus)         catEl.appendChild(renderTask(task.bonus, true, task.id, null));
      if (task.radioGroup)    task.radioGroup.forEach(r => catEl.appendChild(renderRadioTask(r, task.id, task.radioGroup)));
      if (task.stackedBonuses) task.stackedBonuses.forEach(b => catEl.appendChild(renderTask(b, true, task.id, null)));
    });
    main.appendChild(catEl);
  });

  main.appendChild(buildFooter());
  updateStats();
}

// ─── TASK ROW ─────────────────────────────────────────────────────
function renderTask(task, isSub, parentId, _unused) {
  const isFailed = !!day.failed[task.id];
  const row = document.createElement("div");
  let cls = "task";
  if (isSub) cls += " sub";
  if (task.variable) cls += " variable";
  row.className = cls;

  // checkbox
  const cb = document.createElement("input");
  cb.type = "checkbox";
  cb.checked = !!day.checks[task.id];
  cb.disabled = isFailed;

  if (task.variable) {
    cb.addEventListener("change", () => {
      day.checks[task.id] = cb.checked;
      day.failed[task.id] = false;
      if (!cb.checked) day.variable[task.id] = 0;
      persistAndRender();
    });
  } else {
    cb.addEventListener("change", () => {
      day.checks[task.id] = cb.checked;
      day.failed[task.id] = false;
      if (!cb.checked) clearChildren(task);
      persistAndRender();
    });
  }
  row.appendChild(cb);

  // label
  const label = document.createElement("label");
  label.textContent = task.name;
  row.appendChild(label);

  // make the whole row clickable (except the checkbox and fail button themselves)
  row.style.cursor = isFailed ? "default" : "pointer";
  row.addEventListener("click", (e) => {
    if (e.target === cb || e.target.classList.contains("fail-btn") || e.target.tagName === "INPUT") return;
    if (!isFailed && !cb.disabled) cb.click();
  });

  // right side
  if (isFailed) {
    const skull = document.createElement("span"); skull.className = "skull"; skull.textContent = "💀";
    row.appendChild(skull);
  } else if (task.variable) {
    const num = document.createElement("input");
    num.type = "number"; num.min = 0; num.placeholder = "pts";
    num.value = day.variable[task.id] || "";
    num.addEventListener("input", () => {
      day.variable[task.id] = parseInt(num.value, 10) || 0;
      day.checks[task.id] = day.variable[task.id] > 0;
      persistAndRender();
    });
    row.appendChild(num);
  } else {
    const pts = document.createElement("span");
    pts.className = "pts" + (task.pts === 0 ? " zero" : "");
    pts.textContent = task.pts > 0 ? "+" + task.pts : "0";
    row.appendChild(pts);
  }

  row.appendChild(makeFailBtn(task.id, isFailed, () => {
    day.checks[task.id] = false;
    if (task.variable) day.variable[task.id] = 0;
    clearChildren(task);
  }));

  // sub-item lock state
  if (isSub && parentId) {
    const parentChecked = !!day.checks[parentId];
    row.classList.toggle("unlocked", parentChecked);
    cb.disabled = !parentChecked || isFailed;
  }
  if (cb.checked) row.classList.add("done");
  if (isFailed) row.classList.add("failed");
  return row;
}

// ─── RADIO ROW ────────────────────────────────────────────────────
function renderRadioTask(task, parentId, siblings) {
  const isFailed = !!day.failed[task.id];
  const parentChecked = !!day.checks[parentId];
  const row = document.createElement("div");
  row.className = "task radio-option" + (parentChecked ? " unlocked" : "") + (isFailed ? " failed" : "");
  if (day.checks[task.id]) row.classList.add("done");

  const cb = document.createElement("input");
  cb.type = "checkbox";
  cb.checked = !!day.checks[task.id];
  cb.disabled = !parentChecked || isFailed;
  cb.addEventListener("change", () => {
    siblings.forEach(s => { day.checks[s.id] = false; });
    day.checks[task.id] = cb.checked;
    day.failed[task.id] = false;
    persistAndRender();
  });
  row.appendChild(cb);

  const label = document.createElement("label");
  label.textContent = task.name;
  row.appendChild(label);

  row.style.cursor = (parentChecked && !isFailed) ? "pointer" : "default";
  row.addEventListener("click", (e) => {
    if (e.target === cb || e.target.classList.contains("fail-btn") || e.target.tagName === "INPUT") return;
    if (parentChecked && !isFailed) cb.click();
  });

  if (isFailed) {
    const skull = document.createElement("span"); skull.className = "skull"; skull.textContent = "💀";
    row.appendChild(skull);
  } else {
    const pts = document.createElement("span");
    pts.className = "pts" + (task.pts === 0 ? " zero" : "");
    pts.textContent = task.pts > 0 ? "+" + task.pts : "0";
    row.appendChild(pts);
  }

  row.appendChild(makeFailBtn(task.id, isFailed, () => { day.checks[task.id] = false; }));
  return row;
}

// ─── HELPERS ──────────────────────────────────────────────────────
function clearChildren(task) {
  if (task.bonus) { day.checks[task.bonus.id] = false; day.failed[task.bonus.id] = false; }
  if (task.radioGroup) task.radioGroup.forEach(r => { day.checks[r.id] = false; day.failed[r.id] = false; });
  if (task.stackedBonuses) task.stackedBonuses.forEach(b => { day.checks[b.id] = false; day.failed[b.id] = false; });
}

function makeFailBtn(taskId, isFailed, onFail) {
  const btn = document.createElement("button");
  btn.className = "fail-btn"; btn.type = "button"; btn.textContent = "✕";
  btn.title = isFailed ? "Undo fail" : "Mark as failed";
  btn.addEventListener("click", () => {
    const next = !day.failed[taskId];
    day.failed[taskId] = next;
    if (next) onFail();
    persistAndRender();
  });
  return btn;
}

// ─── SCORE ────────────────────────────────────────────────────────
function computeScore(d) {
  let total = 0;
  ALL_DATA.forEach(group => {
    group.tasks.forEach(task => {
      if (task.variable) {
        total += d.variable[task.id] || 0;
      } else {
        if (d.checks[task.id]) total += task.pts;
        if (task.bonus && d.checks[task.bonus.id]) total += task.bonus.pts;
        if (task.radioGroup)    task.radioGroup.forEach(r    => { if (d.checks[r.id])    total += r.pts; });
        if (task.stackedBonuses) task.stackedBonuses.forEach(b => { if (d.checks[b.id]) total += b.pts; });
      }
    });
  });
  return total;
}

// ─── STATS ────────────────────────────────────────────────────────
function updateStats() {
  const score = computeScore(day);
  document.getElementById("todayScore").textContent = score;

  const allDates = Object.keys(history).sort();
  let best = 0;
  allDates.forEach(d => { best = Math.max(best, computeScore(history[d])); });
  document.getElementById("bestScore").textContent = best;

  const last7 = allDates.slice(-7);
  const avg = last7.length ? Math.round(last7.reduce((s,d) => s + computeScore(history[d]), 0) / last7.length) : 0;
  document.getElementById("avgScore").textContent = avg;

  let streak = 0, cursor = new Date();
  while (true) {
    const k = dateKey(cursor);
    const d = history[k];
    if (d && computeScore(d) > 0) { streak++; cursor.setDate(cursor.getDate() - 1); }
    else break;
  }
  document.getElementById("streak").textContent = streak;

  const real = todayDate();
  const isToday = dateKey(selectedDate) === dateKey(real);
  const yest = new Date(real); yest.setDate(yest.getDate() - 1);
  const isYesterday = dateKey(selectedDate) === dateKey(yest);
  const fmt = selectedDate.toLocaleDateString(undefined, { weekday:"long", month:"short", day:"numeric" });
  document.getElementById("dateLabel").textContent = isToday ? "Today — " + fmt : isYesterday ? "Yesterday — " + fmt : fmt;
  document.getElementById("scoreLabel").textContent = isToday ? "Today" : "Score";
  document.getElementById("nextDay").disabled = isToday;

  const pct = Math.min(100, Math.round((score / DAILY_GOAL) * 100));
  document.getElementById("goalText").textContent = score + " / " + DAILY_GOAL;
  document.getElementById("goalPct").textContent = pct + "%";
  const bar = document.getElementById("goalBar");
  bar.style.width = pct + "%";
  bar.classList.toggle("complete", score >= DAILY_GOAL);
}

// ─── FOOTER ───────────────────────────────────────────────────────
function buildFooter() {
  const wrap = document.createElement("div");
  wrap.className = "footer-actions";

  const resetBtn = document.createElement("button");
  resetBtn.className = "action-btn danger";
  resetBtn.textContent = "Reset this day";
  resetBtn.addEventListener("click", () => {
    if (confirm("Reset this day's checklist?")) {
      history[dateKey(selectedDate)] = { checks:{}, variable:{}, failed:{} };
      day = history[dateKey(selectedDate)];
      persistAndRender();
    }
  });
  wrap.appendChild(resetBtn);

  const hist = document.createElement("div");
  hist.className = "history";
  hist.style.flex = "1 1 100%"; hist.style.order = "2";
  hist.innerHTML = "<h2>Last 14 days</h2>";
  Object.keys(history).sort().reverse().slice(0, 14).forEach(d => {
    const score = computeScore(history[d]);
    const r = document.createElement("div");
    r.className = "hist-row";
    r.innerHTML = `<span>${d}</span><span class="s">${score} pts</span>`;
    hist.appendChild(r);
  });

  const outer = document.createElement("div");
  outer.appendChild(wrap);
  outer.appendChild(hist);
  return outer;
}

// ─── PERSIST ──────────────────────────────────────────────────────
function persistAndRender() {
  history[dateKey(selectedDate)] = day;
  try { saveHistory(history); } catch(e) {}
  render();
}

// ─── DATE NAV ─────────────────────────────────────────────────────
function goToDate(d) {
  d.setHours(0,0,0,0); selectedDate = d;
  day = getDayFor(selectedDate); render();
}
document.getElementById("prevDay").addEventListener("click", () => {
  const d = new Date(selectedDate); d.setDate(d.getDate() - 1); goToDate(d);
});
document.getElementById("nextDay").addEventListener("click", () => {
  if (dateKey(selectedDate) === dateKey(todayDate())) return;
  const d = new Date(selectedDate); d.setDate(d.getDate() + 1); goToDate(d);
});

// ─── PIXEL ART BG ─────────────────────────────────────────────────
function spriteBoxShadow(matrix, size, color) {
  const s = [];
  matrix.forEach((row, y) => [...row].forEach((ch, x) => {
    if (ch === "1") s.push(`${x*size}px ${y*size}px 0 0 ${color}`);
  }));
  return s.join(",");
}
function makeSprite(matrix, size, color, top, left, opacity) {
  const el = document.createElement("div");
  el.className = "sprite";
  el.style.cssText = `width:${size}px;height:${size}px;top:${top};left:${left};opacity:${opacity ?? 1};box-shadow:${spriteBoxShadow(matrix,size,color)}`;
  return el;
}
const SPRITES = {
  sun:      ["00111100","01111110","11111111","11111111","11111111","11111111","01111110","00111100"],
  cloud:    ["00111100000","01111111000","11111111110","11111111111","01111111110"],
  bush:     ["011110","111111","111111"],
  hill:     ["0001100000","0011110000","0111111000","1111111100","1111111110"],
  mushroom: ["0111110","1111111","1101101","1111111","0011000","0011000"],
  star:     ["0010000","0010000","1111111","0111100","0010000","0100010"],
  pipe:     ["111111","111111","111111","111111","111111"],
};
function buildBackground() {
  const layer = document.getElementById("bgLayer");
  if (!layer) return;
  const coin="#fcd000",white="#fcfcfc",green="#00a800",greenDk="#007800",bushGr="#1e9c1e",hillGr="#3cb33c",red="#fc4040";
  layer.appendChild(makeSprite(SPRITES.sun,      10, coin,   "4%",              "8%",              0.95));
  layer.appendChild(makeSprite(SPRITES.cloud,     8, white,  "6%",              "78%",             0.9));
  layer.appendChild(makeSprite(SPRITES.cloud,     6, white,  "16%",             "4%",              0.85));
  layer.appendChild(makeSprite(SPRITES.star,      6, white,  "24%",             "88%",             0.8));
  layer.appendChild(makeSprite(SPRITES.star,      5, white,  "34%",             "6%",              0.7));
  layer.appendChild(makeSprite(SPRITES.mushroom,  7, red,    "45%",             "85%",             0.85));
  layer.appendChild(makeSprite(SPRITES.cloud,     7, white,  "55%",             "5%",              0.8));
  layer.appendChild(makeSprite(SPRITES.hill,      9, hillGr, "calc(100% - 70px)","2%",             0.9));
  layer.appendChild(makeSprite(SPRITES.hill,      7, bushGr, "calc(100% - 56px)","20%",            0.85));
  layer.appendChild(makeSprite(SPRITES.bush,      9, bushGr, "calc(100% - 50px)","84%",            0.9));
  layer.appendChild(makeSprite(SPRITES.bush,      7, green,  "calc(100% - 40px)","92%",            0.85));
  const pipe = makeSprite(SPRITES.pipe, 9, greenDk, "calc(100% - 70px)", "94%", 0.95);
  pipe.style.borderTop = "4px solid #000";
  layer.appendChild(pipe);
}

// ─── INIT ─────────────────────────────────────────────────────────
if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => navigator.serviceWorker.register("sw.js").catch(()=>{}));
}
buildBackground();
render();
</script>
